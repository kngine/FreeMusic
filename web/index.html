<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeTune · 自由音乐</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-logo">🎵</span>
        <div>
          <div class="brand-name">FreeTune</div>
          <div class="brand-sub">自由音乐</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="search">🔍 搜索 Search</button>
        <button class="nav-item" data-view="queue">📜 播放列表 Queue</button>
        <button class="nav-item" data-view="favs">💚 我喜欢 Favorites</button>
      </nav>

      <div class="source-box">
        <label>音乐源 Source</label>
        <select id="source">
          <option value="netease">网易云 NetEase</option>
          <option value="kuwo">酷我 Kuwo</option>
          <option value="tencent">QQ音乐 Tencent</option>
          <option value="migu">咪咕 Migu</option>
          <option value="kugou">酷狗 Kugou</option>
        </select>
        <label>音质 Quality</label>
        <select id="quality">
          <option value="320">320 kbps</option>
          <option value="192">192 kbps</option>
          <option value="128">128 kbps</option>
          <option value="740">无损 FLAC</option>
        </select>
      </div>

      <div class="sidebar-foot">
        自动跨源回退已开启<br/>auto multi-source fallback
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <input id="q" type="text" placeholder="搜索歌曲、歌手…  Search songs or artists" autocomplete="off" />
          <button id="search-btn">搜索</button>
        </div>
      </header>

      <section class="content">
        <!-- Search / list view -->
        <div id="view-search" class="view active">
          <h2 id="list-title">热门推荐 · 试试搜索你喜欢的歌</h2>
          <div id="results" class="track-list"></div>
          <div id="empty" class="empty">输入歌名开始聆听 🎶</div>
        </div>

        <!-- Queue view -->
        <div id="view-queue" class="view">
          <h2>播放列表 Queue</h2>
          <div id="queue-list" class="track-list"></div>
        </div>

        <!-- Favorites view -->
        <div id="view-favs" class="view">
          <h2>我喜欢的音乐 Favorites</h2>
          <div id="favs-list" class="track-list"></div>
        </div>
      </section>
    </main>

    <!-- Now-playing lyric panel -->
    <aside id="lyric-panel" class="lyric-panel">
      <div class="lp-cover-wrap">
        <img id="lp-cover" class="lp-cover" alt="" />
      </div>
      <div id="lp-title" class="lp-title">未在播放</div>
      <div id="lp-artist" class="lp-artist"></div>
      <div id="lyrics" class="lyrics"></div>
    </aside>
  </div>

  <!-- Player bar -->
  <footer class="player">
    <div class="player-info">
      <img id="bar-cover" class="bar-cover" alt="" />
      <div class="bar-meta">
        <div id="bar-title" class="bar-title">FreeTune</div>
        <div id="bar-artist" class="bar-artist">准备就绪</div>
      </div>
      <button id="fav-btn" class="icon-btn fav" title="收藏">🤍</button>
    </div>

    <div class="player-center">
      <div class="controls">
        <button id="prev" class="icon-btn" title="上一首">⏮</button>
        <button id="play" class="play-btn" title="播放/暂停">▶</button>
        <button id="next" class="icon-btn" title="下一首">⏭</button>
        <button id="mode" class="icon-btn" title="播放模式">🔁</button>
      </div>
      <div class="progress">
        <span id="cur">0:00</span>
        <input id="seek" type="range" min="0" max="1000" value="0" />
        <span id="dur">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button id="lyric-toggle" class="icon-btn" title="歌词">词</button>
      <span class="vol-ic">🔊</span>
      <input id="vol" type="range" min="0" max="100" value="90" />
    </div>
  </footer>

  <audio id="audio"></audio>
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
