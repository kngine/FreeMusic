# FreeTune — Netlify deployment config
# Static frontend in web/, backend as Deno edge functions in netlify/edge-functions/.
# Each edge function declares its own route via `export const config = { path }`,
# so no build step is required.

[build]
  publish = "web"
  command = ""
  edge_functions = "netlify/edge-functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
